<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer v8.17</title>
<style>
  body {
    background-color: #000;
    color: #fff;
    font-family: Consolas, monospace;
    margin: 0;
    padding: 0 10px;
  }
  h1 { text-align: center; margin-top: 10px; }
  .form-section { margin: 15px 0; }
  select {
    padding: 5px;
    font-size: 16px;
    margin-right: 5px;
    background-color: #111;
    color: #fff;
    border: 1px solid #444;
  }
  button {
    padding: 7px 15px;
    font-size: 16px;
    background-color: #222;
    color: #fff;
    border: 1px solid #444;
    cursor: pointer;
  }
  button:hover { background-color: #333; }
  .train-list { margin-top: 20px; }
  .train-item { padding: 10px; border-bottom: 1px solid #444; }
  .operator-lner { color: #C8102E; font-weight: bold; }
  .operator-lumo { color: #005EB8; font-weight: bold; }
  .timer { margin-top: 10px; font-size: 14px; text-align: center; }
  footer { text-align: center; margin: 20px 0 10px 0; font-size: 12px; color: #888; }
</style>
</head>
<body>

<h1>Train Viewer v8.17</h1>

<div class="form-section">
  <label>Route:</label>
  <select id="route">
    <option>King's X → Newcastle</option>
    <option>Newcastle → King's X</option>
    <option>St. Pancras → Newcastle</option>
    <option>Newcastle → St. Pancras</option>
  </select>
</div>

<div class="form-section">
  <label>Date:</label>
  <select id="day"></select>
  <select id="month"></select>
  <select id="year"></select>
</div>

<div class="form-section">
  <label>Time:</label>
  <select id="hour"></select> :
  <select id="minute"></select>
</div>

<div class="form-section">
  <button id="searchBtn">Search</button>
</div>

<div class="timer" id="refreshTimer"></div>

<div class="train-list" id="trainResults"></div>

<footer>Credit: LDBWS</footer>

<script>
// Fill date/time dropdowns
const now = new Date();
const daySel = document.getElementById("day");
const monthSel = document.getElementById("month");
const yearSel = document.getElementById("year");
const hourSel = document.getElementById("hour");
const minuteSel = document.getElementById("minute");

// Day 1-31
for(let d=1; d<=31; d++){
  const opt = document.createElement("option");
  opt.value = d; opt.text = d;
  if(d===now.getDate()) opt.selected = true;
  daySel.add(opt);
}

// Month 1-12 + short name
const monthNames = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
for(let m=1; m<=12; m++){
  const opt = document.createElement("option");
  opt.value = m;
  opt.text = m + " - " + monthNames[m-1];
  if(m===now.getMonth()+1) opt.selected = true;
  monthSel.add(opt);
}

// Year 2026-2036
for(let y=2026; y<=2036; y++){
  const opt = document.createElement("option");
  opt.value = y; opt.text = y;
  if(y===now.getFullYear()) opt.selected = true;
  yearSel.add(opt);
}

// Hour 00-23
for(let h=0; h<=23; h++){
  const opt = document.createElement("option");
  opt.value = h; opt.text = h.toString().padStart(2,'0');
  if(h===now.getHours()) opt.selected = true;
  hourSel.add(opt);
}

// Minute every 5 minutes
for(let mi=0; mi<60; mi+=5){
  const opt = document.createElement("option");
  opt.value = mi; opt.text = mi.toString().padStart(2,'0');
  if(mi===Math.floor(now.getMinutes()/5)*5) opt.selected = true;
  minuteSel.add(opt);
}

// Search button click
document.getElementById("searchBtn").addEventListener("click", async ()=>{
  const route = document.getElementById("route").value;
  const date = document.getElementById("day").value + "-" + document.getElementById("month").value + "-" + document.getElementById("year").value;
  const time = document.getElementById("hour").value + ":" + document.getElementById("minute").value;
  const url = `https://train-api-v2.onrender.com/trains?route=${encodeURIComponent(route)}&date=${date}&time=${time}`;
  const resultsDiv = document.getElementById("trainResults");
  resultsDiv.innerHTML = "Loading...";
  
  try{
    const res = await fetch(url);
    const data = await res.json();
    if(!data || !data.data || data.data.length===0){
      resultsDiv.innerHTML = "<div>No trains found</div>";
      return;
    }
    resultsDiv.innerHTML = "";
    data.data.forEach(t=>{
      const div = document.createElement("div");
      div.className = "train-item";
      let trainText = `${t.time} ${t.origin} → ${t.destination}`;
      if(t.terminating && t.terminating!==t.destination) trainText += `<br>&nbsp;&nbsp;Term. @ ${t.terminating}`;
      trainText += `<br>Platform ${t.platform}<br>`;
      if(t.operator==="London North Eastern Railway") trainText += `<span class='operator-lner'>LNER</span><br>`; 
      else if(t.operator==="Lumo") trainText += `<span class='operator-lumo'>Lumo</span><br>`;
      else trainText += t.operator + "<br>";
      trainText += t.status + "<br>" + t.duration + "<br>" + t.stops + " stops";
      div.innerHTML = trainText;
      resultsDiv.appendChild(div);
    });
    startRefreshTimer();
  }catch(err){
    resultsDiv.innerHTML = "Error fetching train data.";
    console.error(err);
  }
});

let timerInterval;
function startRefreshTimer(){
  clearInterval(timerInterval);
  let seconds = 15;
  const timerDiv = document.getElementById("refreshTimer");
  timerDiv.textContent = `Next refresh in ${seconds} sec`;
  timerInterval = setInterval(()=>{
    seconds--;
    timerDiv.textContent = `Next refresh in ${seconds} sec`;
    if(seconds<=0) clearInterval(timerInterval);
  },1000);
}

</script>
</body>
</html>
