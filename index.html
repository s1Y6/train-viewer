<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer v8.14</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f2f2f2; }
h1 { margin-bottom: 20px; }
label { display: block; margin-top: 10px; margin-bottom: 5px; }
select { padding: 5px; margin-right: 5px; }
button { margin-top: 15px; padding: 10px 20px; }
#results { margin-top: 20px; font-family: monospace; white-space: pre-line; }
</style>
</head>
<body>

<h1>Train Viewer v8.14</h1>

<label for="route">Route:</label>
<select id="route">
  <option value="KGX-NCL">King's X → Newcastle</option>
  <option value="NCL-KGX">Newcastle → King's X</option>
  <option value="STP-NCL">St. Pancras → Newcastle</option>
  <option value="NCL-STP">Newcastle → St. Pancras</option>
</select>

<label>Date:</label>
<select id="date"></select>
<select id="month"></select>
<select id="year"></select>

<label>Time:</label>
<select id="hour"></select> :
<select id="minute"></select>

<br>
<button id="search">Search</button>

<div id="results"></div>

<script>
// Populate Date, Month, Year
var dateSelect = document.getElementById("date");
for(var d=1; d<=31; d++){ var opt=document.createElement("option"); opt.value=d; opt.text=d; dateSelect.add(opt); }

var monthSelect = document.getElementById("month");
var months = ["01 - JAN","02 - FEB","03 - MAR","04 - APR","05 - MAY","06 - JUN","07 - JUL","08 - AUG","09 - SEP","10 - OCT","11 - NOV","12 - DEC"];
for(var i=0;i<months.length;i++){ var opt=document.createElement("option"); opt.value=i+1; opt.text=months[i]; monthSelect.add(opt); }

var yearSelect = document.getElementById("year");
for(var y=2026; y<=2036; y++){ var opt=document.createElement("option"); opt.value=y; opt.text=y; yearSelect.add(opt); }

// Populate Hour and Minute
var hourSelect = document.getElementById("hour");
for(var h=0;h<24;h++){ var val = h<10?"0"+h:h; var opt=document.createElement("option"); opt.value=val; opt.text=val; hourSelect.add(opt); }

var minuteSelect = document.getElementById("minute");
for(var m=0;m<60;m+=5){ var val = m<10?"0"+m:m; var opt=document.createElement("option"); opt.value=val; opt.text=val; minuteSelect.add(opt); }

// XMLHttpRequest version for better Opera Mini support
function fetchTrains() {
  var route = document.getElementById("route").value;
  var resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "Loading...";

  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://train-api-v2.onrender.com/trains?route=" + route, true);
  xhr.onreadystatechange = function() {
    if(xhr.readyState === 4){
      if(xhr.status === 200){
        try{
          var data = JSON.parse(xhr.responseText);
          if(data.error){
            resultsDiv.innerHTML = "<span style='color:red;'>"+data.error+"</span>";
            return;
          }
          var html = "";
          for(var i=0;i<data.data.length;i++){
            var t=data.data[i];
            html += "Time: " + t.time + " | Platform: " + t.platform + " | Status: " + t.status + " | Operator: " + t.operator + "\n";
          }
          resultsDiv.innerText = html;
        }catch(e){
          resultsDiv.innerHTML = "<span style='color:red;'>Error parsing train data.</span>";
        }
      } else {
        resultsDiv.innerHTML = "<span style='color:red;'>Error fetching train data.</span>";
      }
    }
  };
  xhr.send();
}

document.getElementById("search").onclick = fetchTrains;

// Auto-refresh every 15 seconds if results exist
setInterval(function(){
  var resultsDiv = document.getElementById("results");
  if(resultsDiv.innerText.trim() && !resultsDiv.innerText.includes("Error")){
    fetchTrains();
  }
},15000);
</script>

</body>
</html>
