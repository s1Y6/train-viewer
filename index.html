<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Train Viewer v8.7</title>
  <style>
    body { background:black; color:lime; font-family:monospace; font-size:14px; }
    hr { border:1px solid lime; }
    button { margin:5px 0; }
  </style>
</head>
<body>

<div style="border-bottom:1px solid lime;padding-bottom:5px;">
  <h2 style="margin:0;color:lime;">Train Viewer v8.7</h2>
  <p style="margin:0;color:yellow;">Improved train layout</p>
</div>

<hr>

<div id="recent">Recent: None</div>

<hr>

<p><b>Route</b></p>
<select id="route">
  <option value="KGX-NCL">King's X → Newcastle</option>
  <option value="NCL-KGX">Newcastle → King's X</option>
  <option value="STP-NCL">St. Pancras → Newcastle</option>
  <option value="NCL-STP">Newcastle → St. Pancras</option>
</select>

<hr>

<p><b>Date</b></p>
<select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<p><b>Time</b></p>
<select id="hour"></select>
<select id="minute"></select>

<br><br>
<button onclick="run()">Search Trains</button>

<hr>

<div id="output">
Enter details and press search
</div>

<script>
let selectedTime = 0;
let recentMemory = "None";
let refreshTimer;

function init() {
  const now = new Date();
  buildSelect("day", 1, 31, now.getDate());
  buildMonthSelect();
  buildSelect("year", 2025, 2035, now.getFullYear());
  buildSelect("hour", 0, 23, now.getHours());
  buildSelect("minute", 0, 59, now.getMinutes());
  loadRecent();
}

function loadRecent() {
  let r;
  try { r = localStorage.getItem("recentTrip"); } catch(e) { r = null; }
  if (!r) r = recentMemory;
  document.getElementById("recent").innerHTML = "Recent: " + r;
}

function saveRecent(route, timeStr) {
  const map = {
    "KGX-NCL":"KGX→NCL",
    "NCL-KGX":"NCL→KGX",
    "STP-NCL":"STP→NCL",
    "NCL-STP":"NCL→STP"
  };
  const line = map[route] + "@" + timeStr;
  recentMemory = line;
  try { localStorage.setItem("recentTrip", line); } catch(e) {}
}

function buildSelect(id, start, end, selected) {
  const el = document.getElementById(id);
  el.innerHTML = "";
  for (let i = start; i <= end; i++) {
    let val = i < 10 ? "0"+i : i;
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = val;
    if (i === selected) opt.selected = true;
    el.appendChild(opt);
  }
}

function buildMonthSelect() {
  const names = ["January","February","March","April","May","June",
                 "July","August","September","October","November","December"];
  const el = document.getElementById("month");
  el.innerHTML = "";
  const now = new Date().getMonth() + 1;
  for (let i=1; i<=12; i++) {
    let num = i < 10 ? "0"+i : i;
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = num + ": " + names[i-1];
    if (i === now) opt.selected = true;
    el.appendChild(opt);
  }
}

function getDateText() {
  let d = document.getElementById("day").value;
  let m = document.getElementById("month").value;
  let y = document.getElementById("year").value;
  if (d<10) d="0"+d;
  if (m<10) m="0"+m;
  return d + "-" + m + "-" + y;
}

async function run() {
  clearTimeout(refreshTimer);

  const route = document.getElementById("route").value;
  const h = parseInt(document.getElementById("hour").value);
  const m = parseInt(document.getElementById("minute").value);
  const timeStr = format(h*60 + m);
  selectedTime = h*60 + m;

  saveRecent(route, timeStr);
  loadRecent();

  let html = `<b>Date:</b> ${getDateText()}<br><b>Time:</b> ${timeStr}<hr>`;

  try {
    const response = await fetch(`https://train-api-v2.onrender.com/api/train/${route}`);
    const json = await response.json();

    if (json.error) {
      html += `<span style='color:red'>Error fetching train data.</span>`;
    } else {
      html += "<ul>";
      json.data.forEach(train => {
        html += `<li><b>Time:</b> ${train.time} | <b>Platform:</b> ${train.platform} | <b>Status:</b> ${train.status} | <b>Operator:</b> ${train.operator}</li>`;
      });
      html += "</ul>";
    }
  } catch(err) {
    html += `<span style='color:red'>Error fetching train data.</span>`;
  }

  document.getElementById("output").innerHTML = html;

  // Refresh every 15s if user still on page
  refreshTimer = setTimeout(run, 15000);
}

function format(mins) {
  mins = mins % 1440;
  if (mins < 0) mins += 1440;
  const h = Math.floor(mins/60);
  const m = mins%60;
  return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

window.onload = init;
</script>

</body>
</html>
