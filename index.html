<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<h2>🚆 Train Viewer</h2>

<p id="recent">Recent: loading...</p>

<hr>

<!-- ROUTES (HASH LINKS - SAFE FOR OPERA MINI) -->
<a href="#KX-NCL">KX → NCL</a><br>
<a href="#NCL-KX">NCL → KX</a><br>
<a href="#STP-NCL">STP → NCL</a><br>
<a href="#NCL-STP">NCL → STP</a><br>

<hr>

Time Control<br>
<a href="#now">Now</a>
<a href="#m60">-1h</a>
<a href="#p60">+1h</a>

<hr>

<div id="output">Select route</div>

<script>

let route = "";
let baseTime = new Date();

function loadRecent() {
  const r = localStorage.getItem("recentTrip");
  document.getElementById("recent").innerText =
    "Recent: " + (r ? r : "None");
}

function render() {
  if (!route) {
    loadRecent();
    return;
  }

  const trains = generateTrains(baseTime);

  const timeStr =
    baseTime.getHours() + ":" +
    String(baseTime.getMinutes()).padStart(2, "0");

  localStorage.setItem("recentTrip", route + " @ " + timeStr);

  loadRecent();

  let html = "<h3>Route: " + route + "</h3>";
  html += "<p>Selected: " + timeStr + "</p><hr>";

  for (let i = 0; i < trains.length; i++) {
    html += "🚆 " + trains[i].label + " - " + trains[i].time + "<br>";
  }

  document.getElementById("output").innerHTML = html;
}

// SAFE HASH ROUTING (NO BUTTON EVENTS)
function handleHash() {
  const h = location.hash.replace("#", "");

  if (!h) return;

  // ROUTES
  if (h === "KX-NCL" || h === "NCL-KX" || h === "STP-NCL" || h === "NCL-STP") {
    route = h;
    render();
  }

  // TIME CONTROL
  if (h === "now") {
    baseTime = new Date();
    render();
  }

  if (h === "m60") {
    baseTime = new Date();
    baseTime.setMinutes(baseTime.getMinutes() - 60);
    render();
  }

  if (h === "p60") {
    baseTime = new Date();
    baseTime.setMinutes(baseTime.getMinutes() + 60);
    render();
  }
}

// TRAIN GENERATOR
function generateTrains(base) {
  let trains = [];

  for (let i = -1; i <= 1; i++) {
    let t = new Date(base);
    t.setMinutes(t.getMinutes() + i * 30);

    let h = t.getHours();
    let m = String(t.getMinutes()).padStart(2, "0");

    trains.push({
      time: h + ":" + m,
      label: i === 0 ? "⭐ Closest" : (i < 0 ? "Before" : "After")
    });
  }

  return trains;
}

// INIT
window.onload = function() {
  loadRecent();
  handleHash();
};

// LISTEN FOR HASH CHANGES
window.onhashchange = function() {
  handleHash();
};

</script>

</body>
</html>
