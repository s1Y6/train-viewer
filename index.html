<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer V8.11</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; color: #333; margin: 0; padding: 20px; }
  h1 { text-align: center; }
  .container { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
  label { display: block; margin-top: 10px; font-weight: bold; }
  select, button { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
  button { background: #333; color: #fff; cursor: pointer; }
  button:hover { opacity: 0.9; }
  .results { margin-top: 20px; }
  .train { padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
  .operator.lner { color: #d32f2f; font-weight: bold; } /* Red similar to LNER logo */
  .operator.lumo { color: #1976d2; font-weight: bold; }  /* Blue for Lumo */
  .countdown { margin-top: 10px; font-size: 14px; text-align: center; color: #555; }
  .credit { text-align: center; margin-top: 30px; font-size: 12px; color: #888; }
</style>
</head>
<body>
<div class="container">
  <h1>Train Viewer V8.11</h1>

  <label for="route">Route:</label>
  <select id="route">
    <option value="KGX-NCL">King's X → Newcastle</option>
    <option value="NCL-KGX">Newcastle → King's X</option>
    <option value="STP-NCL">St. Pancras → Newcastle</option>
    <option value="NCL-STP">Newcastle → St. Pancras</option>
  </select>

  <label for="day">Date:</label>
  <select id="day"></select>
  <select id="month"></select>
  <select id="year"></select>

  <label for="hour">Time:</label>
  <select id="hour"></select> : <select id="minute"></select>

  <button id="searchBtn">Search</button>

  <div class="countdown" id="countdown"></div>
  <div class="results" id="results"></div>
</div>

<div class="credit">Credit: LDBWS</div>

<script>
  // Populate date/time dropdowns
  const daySelect = document.getElementById('day');
  const monthSelect = document.getElementById('month');
  const yearSelect = document.getElementById('year');
  const hourSelect = document.getElementById('hour');
  const minuteSelect = document.getElementById('minute');

  for(let d=1; d<=31; d++) daySelect.add(new Option(d, d));
  const monthNames = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  for(let m=1; m<=12; m++) monthSelect.add(new Option(`${m} - ${monthNames[m-1]}`, m));
  for(let y=2026; y<=2036; y++) yearSelect.add(new Option(y, y));
  for(let h=0; h<24; h++) hourSelect.add(new Option(String(h).padStart(2,'0'), h));
  for(let min=0; min<60; min+=5) minuteSelect.add(new Option(String(min).padStart(2,'0'), min));

  const searchBtn = document.getElementById('searchBtn');
  const resultsDiv = document.getElementById('results');
  const countdownDiv = document.getElementById('countdown');
  let countdownTimer;

  searchBtn.addEventListener('click', () => {
    fetchTrains();
  });

  async function fetchTrains() {
    const route = document.getElementById('route').value;
    const day = daySelect.value;
    const month = monthSelect.value;
    const year = yearSelect.value;
    const hour = hourSelect.value;
    const minute = minuteSelect.value;

    const url = `https://train-api-v2.onrender.com/trains?route=${route}&date=${day}-${month}-${year}&time=${hour}:${minute}`;

    try {
      const res = await fetch(url);
      if(!res.ok) throw new Error("Error fetching train data.");
      const data = await res.json();
      displayTrains(data.data);
      startCountdown();
    } catch(e) {
      resultsDiv.innerHTML = `<p style="color:red;">${e.message}</p>`;
    }
  }

  function displayTrains(trains) {
    resultsDiv.innerHTML = '';
    if(trains.length === 0) {
      resultsDiv.innerHTML = '<p>No trains found.</p>';
      return;
    }
    trains.forEach(train => {
      const div = document.createElement('div');
      div.className = 'train';
      const operatorClass = train.operator.toLowerCase() === 'lner' ? 'operator lner' : 'operator lumo';
      div.innerHTML = `
        <span>${train.time} | Platform: ${train.platform} | Status: ${train.status}</span>
        <span class="${operatorClass}">${train.operator}</span>
      `;
      resultsDiv.appendChild(div);
    });
  }

  function startCountdown() {
    clearInterval(countdownTimer);
    let timeLeft = 15;
    countdownDiv.textContent = `Next refresh in ${timeLeft} sec`;
    countdownTimer = setInterval(() => {
      timeLeft--;
      if(timeLeft <= 0) {
        clearInterval(countdownTimer);
        fetchTrains();
      } else {
        countdownDiv.textContent = `Next refresh in ${timeLeft} sec`;
      }
    }, 1000);
  }
</script>
</body>
</html>
