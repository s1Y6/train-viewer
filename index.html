<script>

var selectedTime = 0;
var selectedRoute = "";
var selectedDate = "";

// INIT
function init() {
  var now = new Date();

  document.getElementById("date").value =
    now.toISOString().split("T")[0];

  document.getElementById("time").value =
    now.toTimeString().slice(0,5);
}

// FORMAT DATE → DD-MM-YYYY
function formatDate(input) {
  if (!input) return "Not set";

  var parts = input.split("-");
  return parts[2] + "-" + parts[1] + "-" + parts[0];
}

// MAIN RUN
function run() {

  selectedRoute = document.getElementById("route").value;
  selectedDate = document.getElementById("date").value;

  var time = document.getElementById("time").value;

  var parts = time.split(":");
  selectedTime = (parseInt(parts[0]) * 60) + parseInt(parts[1]);

  var html = "<b>Train Viewer v7.3</b><br><br>";

  html += "<b>Date:</b> " + formatDate(selectedDate) + "<br>";
  html += "<b>Time:</b> " + time + "<br><hr>";

  html += buildTrains();

  document.getElementById("output").innerHTML = html;
}

// BUILD TRAIN LIST (CLICKABLE)
function buildTrains() {

  var out = "";

  out += "<div onclick='showTrain(" + (selectedTime - 25) + ")'>🚆 Before - " + format(selectedTime - 25) + "</div><br>";

  out += "<div onclick='showTrain(" + selectedTime + ")'><b>🚆 ⭐ Closest - " + format(selectedTime) + "</b></div><br>";

  out += "<div onclick='showTrain(" + (selectedTime + 25) + ")'>🚆 After - " + format(selectedTime + 25) + "</div>";

  return out;
}

// SHOW TRAIN DETAILS (STAGE 4)
function showTrain(mins) {

  var operator = pickOperator(mins);
  var platform = (mins % 10) + 1;
  var delay = mins % 7;

  var depart = format(mins);
  var arrive = format(mins + 155); // ~2h35

  var html = "<b>Train Viewer v7.3</b><br><br>";

  html += "<b>Operator:</b> " + operator + "<br><br>";

  html += "<b>PLATFORM: " + platform + "</b><br><br>";

  if (delay === 0) {
    html += "Status: On time<br><br>";
  } else {
    html += "Status: +" + delay + " min late<br><br>";
  }

  html += "Depart: " + depart + "<br>";
  html += "Arrive: " + arrive + "<br><br>";

  html += "<button onclick='run()'>← Back</button>";

  document.getElementById("output").innerHTML = html;
}

// SIMPLE OPERATOR ROTATION
function pickOperator(mins) {

  var r = mins % 3;

  if (r === 0) return "LNER";
  if (r === 1) return "Lumo";
  return "CrossCountry";
}

// FORMAT TIME
function format(mins) {

  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = init;

</script>
