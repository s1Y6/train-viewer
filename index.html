<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v7</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<h2>🚆 Train Viewer v7</h2>
<p style="color:yellow;">Real input planner (full-screen editor mode)</p>

<hr>

<!-- REAL INPUTS -->
<p><b>Route</b></p>
<select id="route">
  <option value="KX-NCL">KX → NCL</option>
  <option value="NCL-KX">NCL → KX</option>
  <option value="STP-NCL">STP → NCL</option>
  <option value="NCL-STP">NCL → STP</option>
</select>

<p><b>Date</b></p>
<input type="date" id="date">

<p><b>Time</b></p>
<input type="time" id="time">

<br><br>

<button onclick="run()">Search Trains</button>

<hr>

<div id="output">Enter details and press search</div>

<script>

function init() {
  // default values = NOW
  var now = new Date();

  document.getElementById("date").value =
    now.toISOString().split("T")[0];

  document.getElementById("time").value =
    now.toTimeString().slice(0,5);
}

function run() {
  var route = document.getElementById("route").value;
  var date = document.getElementById("date").value;
  var time = document.getElementById("time").value;

  var html = "<b>Train Viewer v7</b><br><br>";

  html += "<b>Route:</b> " + route + "<br>";
  html += "<b>Date:</b> " + date + "<br>";
  html += "<b>Time:</b> " + time + "<br><hr>";

  html += buildTrains(time);

  document.getElementById("output").innerHTML = html;
}

// SIMPLE TRAIN ENGINE
function buildTrains(timeStr) {

  var parts = timeStr.split(":");
  var base = (parseInt(parts[0]) * 60) + parseInt(parts[1]);

  var out = "";

  out += "🚆 Before - " + format(base - 25) + "<br>";
  out += "🚆 ⭐ Closest - " + format(base) + "<br>";
  out += "🚆 After - " + format(base + 25) + "<br>";

  return out;
}

// FORMAT MINUTES
function format(mins) {
  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = init;

</script>

</body>
</html>
