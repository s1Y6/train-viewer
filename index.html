<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v7.4</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<!-- HEADER -->
<div style="border-bottom:1px solid lime;padding-bottom:5px;">
  <h2 style="margin:0;color:lime;">🚆 Train Viewer v7.4</h2>
  <p style="margin:0;color:yellow;">Button visibility fix</p>
</div>

<hr>

<p><b>Route</b></p>

<select id="route" style="background:white;color:black;">

  <option value="KX-NCL">King's X → Newcastle</option>
  <option value="NCL-KX">Newcastle → King's X</option>
  <option value="STP-NCL">St. Pancras → Newcastle</option>
  <option value="NCL-STP">Newcastle → St. Pancras</option>

</select>

<p><b>Date</b></p>

<input type="date"
       id="date"
       style="background:white;color:black;border:1px solid lime;">

<p><b>Time</b></p>

<input type="time"
       id="time"
       style="background:white;color:black;border:1px solid lime;">

<br><br>

<button onclick="run()" style="background:lime;color:black;">
  Search Trains
</button>

<hr>

<div id="output">Enter details and press search</div>

<script>

var selectedTime = 0;
var selectedDate = "";

// INIT
function init() {
  var now = new Date();

  document.getElementById("date").value =
    now.toISOString().split("T")[0];

  document.getElementById("time").value =
    now.toTimeString().slice(0,5);
}

// FORMAT DATE
function formatDate(input) {
  if (!input) return "Not set";

  var parts = input.split("-");
  return parts[2] + "-" + parts[1] + "-" + parts[0];
}

// MAIN
function run() {

  var time = document.getElementById("time").value;
  if (!time) time = "12:00";

  selectedDate = document.getElementById("date").value;

  var parts = time.split(":");
  selectedTime = (parseInt(parts[0]) * 60) + parseInt(parts[1]);

  var html = "<b>Train Viewer v7.4</b><br><br>";

  html += "<b>Date:</b> " + formatDate(selectedDate) + "<br>";
  html += "<b>Time:</b> " + time + "<br><hr>";

  html += buildTrains();

  document.getElementById("output").innerHTML = html;
}

// BUILD TRAINS (TEXT INSIDE BUTTON)
function buildTrains() {

  var before = selectedTime - 25;
  var closest = selectedTime;
  var after = selectedTime + 25;

  var out = "";

  out += "<button style='color:black;background:white;' onclick='showTrain(" + before + ")'>🚆 Before - " + format(before) + "</button><br><br>";

  out += "<button style='color:black;background:white;' onclick='showTrain(" + closest + ")'>🚆 ⭐ Closest - " + format(closest) + "</button><br><br>";

  out += "<button style='color:black;background:white;' onclick='showTrain(" + after + ")'>🚆 After - " + format(after) + "</button>";

  return out;
}

// DETAILS
function showTrain(mins) {

  var operator = pickOperator(mins);
  var platform = (mins % 10) + 1;
  var delay = mins % 7;

  var depart = format(mins);
  var arrive = format(mins + 155);

  var html = "<b>Train Viewer v7.4</b><br><br>";

  html += "<b>Operator:</b> " + operator + "<br><br>";
  html += "<b>PLATFORM: " + platform + "</b><br><br>";

  if (delay === 0) {
    html += "Status: On time<br><br>";
  } else {
    html += "Status: +" + delay + " min late<br><br>";
  }

  html += "Depart: " + depart + "<br>";
  html += "Arrive: " + arrive + "<br><br>";

  html += "<button onclick='run()'>← Back</button>";

  document.getElementById("output").innerHTML = html;
}

// OPERATOR
function pickOperator(mins) {
  var r = mins % 3;

  if (r === 0) return "LNER";
  if (r === 1) return "Lumo";
  return "CrossCountry";
}

// FORMAT TIME
function format(mins) {

  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = init;

</script>

</body>
</html>
