<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v7.2</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<!-- HEADER -->
<div style="border-bottom:1px solid lime;padding-bottom:5px;">
  <h2 style="margin:0;color:lime;">🚆 Train Viewer v7.2</h2>
  <p style="margin:0;color:yellow;">Station labels + DD-MM-YYYY format</p>
</div>

<hr>

<!-- ROUTE -->
<p><b>Route</b></p>

<select id="route" style="background:white;color:black;">

  <option value="KX-NCL">KX – Kings Cross → NCL – Newcastle</option>
  <option value="NCL-KX">NCL – Newcastle → KX – Kings Cross</option>
  <option value="STP-NCL">STP – St Pancras → NCL – Newcastle</option>
  <option value="NCL-STP">NCL – Newcastle → STP – St Pancras</option>

</select>

<p><b>Date</b></p>

<input type="date"
       id="date"
       style="background:white;color:black;border:1px solid lime;">

<p><b>Time</b></p>

<input type="time"
       id="time"
       style="background:white;color:black;border:1px solid lime;">

<br><br>

<button onclick="run()" style="background:lime;color:black;">
  Search Trains
</button>

<hr>

<div id="output">Enter details and press search</div>

<script>

function init() {
  var now = new Date();

  document.getElementById("date").value =
    now.toISOString().split("T")[0];

  document.getElementById("time").value =
    now.toTimeString().slice(0,5);
}

// FORMAT DATE → DD-MM-YYYY
function formatDate(input) {
  var parts = input.split("-");
  return parts[2] + "-" + parts[1] + "-" + parts[0];
}

function run() {

  var route = document.getElementById("route").value;
  var dateRaw = document.getElementById("date").value;
  var time = document.getElementById("time").value;

  var html = "<b>Train Viewer v7.2</b><br><br>";

  html += "<b>Route:</b> " + route + "<br>";
  html += "<b>Date:</b> " + formatDate(dateRaw) + "<br>";
  html += "<b>Time:</b> " + time + "<br><hr>";

  html += buildTrains(time);

  document.getElementById("output").innerHTML = html;
}

function buildTrains(timeStr) {

  var parts = timeStr.split(":");
  var base = (parseInt(parts[0]) * 60) + parseInt(parts[1]);

  var out = "";

  out += "🚆 Before - " + format(base - 25) + "<br>";
  out += "🚆 ⭐ Closest - " + format(base) + "<br>";
  out += "🚆 After - " + format(base + 25) + "<br>";

  return out;
}

function format(mins) {

  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = init;

</script>

</body>
</html>
