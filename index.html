<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer V8.18.5</title>
<style>
  body { background-color: black; color: white; font-family: monospace; padding: 20px; }
  h1 { color: white; }
  select, input { background: black; color: white; border: 1px solid white; margin: 2px; padding: 5px; }
  button { background: #222; color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer; }
  .train { border-bottom: 1px solid #555; padding: 5px 0; }
  .operator-lner { color: red; }
  .operator-lumo { color: blue; }
  #timer { margin-top: 10px; font-size: 0.9em; }
  #credits { margin-top: 20px; font-size: 0.8em; }
</style>
</head>
<body>

<h1>Train Viewer V8.18.5</h1>

<form id="trainForm">
  <label>Route: 
    <select id="route">
      <option value="KGX-NCL">King's X → Newcastle</option>
      <option value="NCL-KGX">Newcastle → King's X</option>
      <option value="STP-NCL">St. Pancras → Newcastle</option>
      <option value="NCL-STP">Newcastle → St. Pancras</option>
    </select>
  </label>
  <br>
  <label>Date: 
    <select id="day"></select>
    <select id="month"></select>
    <select id="year"></select>
  </label>
  <br>
  <label>Time: 
    <select id="hour"></select>:<select id="minute"></select>
  </label>
  <br>
  <button type="submit">Search</button>
</form>

<div id="results"></div>
<div id="timer"></div>
<div id="credits">Credit: LDBWS</div>

<script>
  const dayEl = document.getElementById('day');
  const monthEl = document.getElementById('month');
  const yearEl = document.getElementById('year');
  const hourEl = document.getElementById('hour');
  const minuteEl = document.getElementById('minute');

  const months = [
    '01 - JAN','02 - FEB','03 - MAR','04 - APR','05 - MAY','06 - JUN',
    '07 - JUL','08 - AUG','09 - SEP','10 - OCT','11 - NOV','12 - DEC'
  ];

  for(let i=1;i<=31;i++) dayEl.add(new Option(i,i));
  months.forEach((m,i)=> monthEl.add(new Option(m, i+1)));
  for(let y=2026;y<=2036;y++) yearEl.add(new Option(y,y));
  for(let h=0;h<=23;h++) hourEl.add(new Option(h.toString().padStart(2,'0'), h));
  for(let m=0;m<60;m+=5) minuteEl.add(new Option(m.toString().padStart(2,'0'), m));

  // set default current date/time
  const now = new Date();
  dayEl.value = now.getDate();
  monthEl.value = now.getMonth()+1;
  yearEl.value = now.getFullYear();
  hourEl.value = now.getHours();
  minuteEl.value = Math.floor(now.getMinutes()/5)*5;

  const resultsEl = document.getElementById('results');
  const timerEl = document.getElementById('timer');

  let countdown;
  const API_URL = 'https://train-api-v2.onrender.com/trains';

  function startTimer() {
    let sec = 15;
    timerEl.textContent = `Refreshing in ${sec}s...`;
    clearInterval(countdown);
    countdown = setInterval(()=>{
      sec--;
      if(sec <= 0){ clearInterval(countdown); timerEl.textContent=''; return; }
      timerEl.textContent = `Refreshing in ${sec}s...`;
    },1000);
  }

  document.getElementById('trainForm').addEventListener('submit', async e=>{
    e.preventDefault();
    resultsEl.innerHTML = '';
    const route = document.getElementById('route').value;
    const day = dayEl.value;
    const month = monthEl.value;
    const year = yearEl.value;
    const hour = hourEl.value;
    const minute = minuteEl.value;

    const res = await fetch(`${API_URL}?route=${route}&day=${day}&month=${month}&year=${year}&hour=${hour}&minute=${minute}`);
    const data = await res.json();

    if(data.data.length===0){ resultsEl.textContent='No trains found'; return; }

    data.data.forEach(tr=>{
      const div = document.createElement('div');
      div.className='train';
      div.innerHTML = `
        <div>${tr.time} ${tr.from} → ${tr.to}${tr.terminatingAfterDest ? ' Term. @ '+tr.terminatingAfterDest : ''}</div>
        <div>Platform ${tr.platform}</div>
        <div class="operator-${tr.operator.toLowerCase()}">${tr.operator}</div>
        <div>${tr.status}</div>
        <div>${tr.duration} | ${tr.stops} stops</div>
      `;
      resultsEl.appendChild(div);
    });
    startTimer();
  });
</script>

</body>
</html>
