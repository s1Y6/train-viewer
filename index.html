<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v4</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<h2>🚆 Train Viewer v4</h2>
<p style="color:yellow;">Next-train logic upgrade</p>

<hr>

<p><b>Routes</b></p>
<a href="#KX-NCL">KX → NCL</a><br>
<a href="#NCL-KX">NCL → KX</a><br>
<a href="#STP-NCL">STP → NCL</a><br>
<a href="#NCL-STP">NCL → STP</a><br>

<hr>

<p><b>Time</b></p>
<a href="#now">Now</a>
<a href="#m60">-1h</a>
<a href="#p60">+1h</a>

<hr>

<div id="output">Select a route</div>

<script>

function render() {
  var h = window.location.hash;

  var html = "<b>Train Viewer v4</b><br><br>";

  if (!h || h === "#") {
    html += "Choose a route above.";
    document.getElementById("output").innerHTML = html;
    return;
  }

  // ROUTES
  if (h === "#KX-NCL") html += "<b>KX → NCL</b><br><br>" + buildTrains();
  else if (h === "#NCL-KX") html += "<b>NCL → KX</b><br><br>" + buildTrains();
  else if (h === "#STP-NCL") html += "<b>STP → NCL</b><br><br>" + buildTrains();
  else if (h === "#NCL-STP") html += "<b>NCL → STP</b><br><br>" + buildTrains();

  // TIME MODES (visual only for now)
  else if (h === "#now") html += "<b>Time: Now</b>";
  else if (h === "#m60") html += "<b>Time: -1 Hour</b>";
  else if (h === "#p60") html += "<b>Time: +1 Hour</b>";
  else html += "Unknown: " + h;

  document.getElementById("output").innerHTML = html;
}

// 🚆 REAL NEXT-TRAINS STYLE ENGINE
function buildTrains() {
  var now = new Date();
  var base = now.getHours() * 60 + now.getMinutes();

  var out = "";

  for (var i = -2; i <= 2; i++) {
    var t = base + (i * 20); // every 20 min spacing

    out += "🚆 " + label(i) + " - " + format(t) + "<br>";
  }

  return out;
}

function label(i) {
  if (i === 0) return "⭐ Next";
  if (i < 0) return "Before";
  return "After";
}

function format(mins) {
  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = render;
window.onhashchange = render;

</script>

</body>
</html>
