<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v8.0</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<!-- HEADER -->
<div style="border-bottom:1px solid lime;padding-bottom:5px;">
  <h2 style="margin:0;color:lime;">🚆 Train Viewer v8.0</h2>
  <p style="margin:0;color:yellow;">Custom date + time picker</p>
</div>

<hr>

<p><b>Route</b></p>

<select id="route">
  <option value="KX-NCL">King's X → Newcastle</option>
  <option value="NCL-KX">Newcastle → King's X</option>
  <option value="STP-NCL">St. Pancras → Newcastle</option>
  <option value="NCL-STP">Newcastle → St. Pancras</option>
</select>

<hr>

<p><b>Date</b></p>

<select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<p><b>Time</b></p>

<select id="hour"></select>
<select id="minute"></select>

<br><br>

<button onclick="run()">Search Trains</button>

<hr>

<div id="output">
<b>Train Viewer v8.0</b><br><br>
Enter details and press search
</div>

<script>

var selectedTime = 0;

// INIT
function init() {

  var now = new Date();

  buildSelect("day", 1, 31, now.getDate());
  buildSelect("month", 1, 12, now.getMonth() + 1);
  buildSelect("year", 2020, 2030, now.getFullYear());

  buildSelect("hour", 0, 23, now.getHours());
  buildSelect("minute", 0, 59, now.getMinutes());
}

// BUILD DROPDOWN
function buildSelect(id, start, end, selected) {

  var el = document.getElementById(id);

  for (var i = start; i <= end; i++) {

    var val = i;
    if (i < 10) val = "0" + i;

    var opt = document.createElement("option");
    opt.value = i;
    opt.text = val;

    if (i === selected) opt.selected = true;

    el.appendChild(opt);
  }
}

// FORMAT DATE
function getDateText() {

  var d = document.getElementById("day").value;
  var m = document.getElementById("month").value;
  var y = document.getElementById("year").value;

  if (d < 10) d = "0" + d;
  if (m < 10) m = "0" + m;

  return d + "-" + m + "-" + y;
}

// MAIN
function run() {

  var h = parseInt(document.getElementById("hour").value);
  var m = parseInt(document.getElementById("minute").value);

  selectedTime = (h * 60) + m;

  var html = "<b>Train Viewer v8.0</b><br><br>";

  html += "<b>Date:</b> " + getDateText() + "<br>";
  html += "<b>Time:</b> " + format(selectedTime) + "<br><hr>";

  html += buildTrains();

  document.getElementById("output").innerHTML = html;
}

// BUILD TRAINS (TEXT SAFE)
function buildTrains() {

  var before = selectedTime - 25;
  var closest = selectedTime;
  var after = selectedTime + 25;

  var out = "";

  out += "🚆 Before - " + format(before) + " ";
  out += "<button onclick='showTrain(" + before + ")'>View</button><br><br>";

  out += "🚆 ⭐ Closest - " + format(closest) + " ";
  out += "<button onclick='showTrain(" + closest + ")'>View</button><br><br>";

  out += "🚆 After - " + format(after) + " ";
  out += "<button onclick='showTrain(" + after + ")'>View</button>";

  return out;
}

// DETAILS
function showTrain(mins) {

  var operator = pickOperator(mins);
  var platform = (mins % 10) + 1;
  var delay = mins % 7;

  var html = "<b>Train Viewer v8.0</b><br><br>";

  html += "<b>Operator:</b> " + operator + "<br><br>";
  html += "<b>PLATFORM:</b> " + platform + "<br><br>";

  if (delay === 0) {
    html += "Status: On time<br><br>";
  } else {
    html += "Status: +" + delay + " min late<br><br>";
  }

  html += "Depart: " + format(mins) + "<br>";
  html += "Arrive: " + format(mins + 155) + "<br><br>";

  html += "<button onclick='run()'>← Back</button>";

  document.getElementById("output").innerHTML = html;
}

// OPERATOR
function pickOperator(mins) {
  var r = mins % 3;

  if (r === 0) return "LNER";
  if (r === 1) return "Lumo";
  return "CrossCountry";
}

// FORMAT TIME
function format(mins) {

  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = init;

</script>

</body>
</html>
