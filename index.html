<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v8.4</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<!-- HEADER -->
<div style="border-bottom:1px solid lime;padding-bottom:5px;">
  <h2 style="margin:0;color:lime;">Train Viewer v8.4</h2>
  <p style="margin:0;color:yellow;">Stable display fix</p>
</div>

<hr>

<div id="recent">Recent: None</div>

<hr>

<p><b>Route</b></p>

<select id="route">
  <option value="KX-NCL">King's X → Newcastle</option>
  <option value="NCL-KX">Newcastle → King's X</option>
  <option value="STP-NCL">St. Pancras → Newcastle</option>
  <option value="NCL-STP">Newcastle → St. Pancras</option>
</select>

<hr>

<p><b>Date</b></p>

<select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<p><b>Time</b></p>

<select id="hour"></select>
<select id="minute"></select>

<br><br>

<button onclick="run()">Search Trains</button>

<hr>

<div id="output">
Enter details and press search
</div>

<script>

var selectedTime = 0;

// INIT
function init() {

  var now = new Date();

  buildSelect("day", 1, 31, now.getDate());
  buildMonthSelect();
  buildSelect("year", 2025, 2035, now.getFullYear());

  buildSelect("hour", 0, 23, now.getHours());
  buildSelect("minute", 0, 59, now.getMinutes());

  loadRecent();
}

// RECENT
function loadRecent() {
  var r = localStorage.getItem("recentTrip");
  if (!r) r = "None";
  document.getElementById("recent").innerHTML = "Recent: " + r;
}

function saveRecent(route, timeStr) {

  var map = {
    "KX-NCL":"KX→NCL",
    "NCL-KX":"NCL→KX",
    "STP-NCL":"STP→NCL",
    "NCL-STP":"NCL→STP"
  };

  var line = map[route] + "@" + timeStr;

  localStorage.setItem("recentTrip", line);
}

// BUILD SELECT
function buildSelect(id, start, end, selected) {

  var el = document.getElementById(id);

  for (var i = start; i <= end; i++) {

    var val = i;
    if (i < 10) val = "0" + i;

    var opt = document.createElement("option");
    opt.value = i;
    opt.text = val;

    if (i === selected) opt.selected = true;

    el.appendChild(opt);
  }
}

// MONTH SELECT
function buildMonthSelect() {

  var names = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  var el = document.getElementById("month");
  var now = new Date().getMonth() + 1;

  for (var i = 1; i <= 12; i++) {

    var num = i;
    if (i < 10) num = "0" + i;

    var opt = document.createElement("option");
    opt.value = i;
    opt.text = num + ": " + names[i-1];

    if (i === now) opt.selected = true;

    el.appendChild(opt);
  }
}

// DATE TEXT
function getDateText() {

  var d = document.getElementById("day").value;
  var m = document.getElementById("month").value;
  var y = document.getElementById("year").value;

  if (d < 10) d = "0" + d;
  if (m < 10) m = "0" + m;

  return d + "-" + m + "-" + y;
}

// MAIN
function run() {

  var route = document.getElementById("route").value;

  var h = parseInt(document.getElementById("hour").value);
  var m = parseInt(document.getElementById("minute").value);

  var timeStr = format((h * 60) + m);

  selectedTime = (h * 60) + m;

  saveRecent(route, timeStr);
  loadRecent();

  var html = "";

  html += "<b>Date:</b> " + getDateText() + "<br>";
  html += "<b>Time:</b> " + timeStr + "<br><hr>";

  html += buildTrains();

  document.getElementById("output").innerHTML = html;
}

// BUILD TRAINS (LINKS = MOST STABLE)
function buildTrains() {

  var before = selectedTime - 25;
  var closest = selectedTime;
  var after = selectedTime + 25;

  var out = "";

  out += "<span style='color:white;'>Earlier: " + format(before) + "</span> ";
  out += "<a href='#' onclick='showTrain(" + before + ")' style='color:yellow;'>[View]</a><br><br>";

  out += "<span style='color:white;'>Immediate: " + format(closest) + "</span> ";
  out += "<a href='#' onclick='showTrain(" + closest + ")' style='color:yellow;'>[View]</a><br><br>";

  out += "<span style='color:white;'>Later: " + format(after) + "</span> ";
  out += "<a href='#' onclick='showTrain(" + after + ")' style='color:yellow;'>[View]</a>";

  return out;
}

// DETAILS
function showTrain(mins) {

  var operator = pickOperator(mins);
  var platform = (mins % 10) + 1;
  var delay = mins % 7;

  var html = "<div style='color:white;'>";

  html += "<b>Operator:</b> " + operator + "<br><br>";
  html += "<b>Platform:</b> " + platform + "<br><br>";

  if (delay === 0) {
    html += "Status: On time<br><br>";
  } else {
    html += "Status: +" + delay + " min late<br><br>";
  }

  html += "Depart: " + format(mins) + "<br>";
  html += "Arrive: " + format(mins + 155) + "<br><br>";

  html += "<a href='#' onclick='run()' style='color:yellow;'>[Back]</a>";

  html += "</div>";

  document.getElementById("output").innerHTML = html;
}

// OPERATOR
function pickOperator(mins) {
  var r = mins % 3;

  if (r === 0) return "LNER";
  if (r === 1) return "Lumo";
  return "CrossCountry";
}

// FORMAT TIME
function format(mins) {

  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = init;

</script>

</body>
</html>
