<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v3</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<h2>🚆 Train Viewer v3</h2>
<p style="color:yellow;">Improved timing engine (Nokia safe)</p>

<hr>

<!-- ROUTES -->
<p><b>Routes</b></p>
<a href="#KX-NCL">KX → NCL</a><br>
<a href="#NCL-KX">NCL → KX</a><br>
<a href="#STP-NCL">STP → NCL</a><br>
<a href="#NCL-STP">NCL → STP</a><br>

<hr>

<p><b>Time</b></p>
<a href="#now">Now</a>
<a href="#m60">-1h</a>
<a href="#p60">+1h</a>

<hr>

<div id="output">Select a route</div>

<script>

function render() {
  var h = window.location.hash;

  var html = "<b>Train Viewer v3</b><br><br>";

  // DEFAULT
  if (!h || h === "#") {
    html += "Choose a route above.";
    document.getElementById("output").innerHTML = html;
    return;
  }

  // ROUTES
  if (h === "#KX-NCL") {
    html += "<b>KX → NCL</b><br><br>";
    html += buildTrains("Kings Cross", "Newcastle");
  }

  else if (h === "#NCL-KX") {
    html += "<b>NCL → KX</b><br><br>";
    html += buildTrains("Newcastle", "Kings Cross");
  }

  else if (h === "#STP-NCL") {
    html += "<b>STP → NCL</b><br><br>";
    html += buildTrains("St Pancras", "Newcastle");
  }

  else if (h === "#NCL-STP") {
    html += "<b>NCL → STP</b><br><br>";
    html += buildTrains("Newcastle", "St Pancras");
  }

  // TIME MODES
  else if (h === "#now") {
    html += "<b>Time: Now</b>";
  }
  else if (h === "#m60") {
    html += "<b>Time: -1 Hour</b>";
  }
  else if (h === "#p60") {
    html += "<b>Time: +1 Hour</b>";
  }

  else {
    html += "Unknown selection: " + h;
  }

  document.getElementById("output").innerHTML = html;
}

// SIMPLE TRAIN ENGINE (REAL TIME BASED)
function buildTrains(from, to) {
  var now = new Date();

  var base = now.getHours() * 60 + now.getMinutes();

  var t1 = formatTime(base - 30);
  var t2 = formatTime(base);
  var t3 = formatTime(base + 30);

  return ""
    + "🚆 Before - " + t1 + "<br>"
    + "🚆 ⭐ Closest - " + t2 + "<br>"
    + "🚆 After - " + t3 + "<br>";
}

function formatTime(mins) {
  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = render;
window.onhashchange = render;

</script>

</body>
</html>
