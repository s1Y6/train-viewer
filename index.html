<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer v8.15</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
  h1 { text-align: center; }
  label { display: block; margin-top: 15px; }
  select { padding: 5px; margin-right: 5px; }
  button { margin-top: 10px; padding: 10px 20px; }
  .train { border-bottom: 1px solid #ccc; padding: 10px 0; }
  .operator.lner { color: #d32f2f; font-weight: bold; }
  .operator.lumo { color: #1976d2; font-weight: bold; }
  .timer { margin-top: 10px; font-size: 0.9em; color: gray; }
  footer { margin-top: 30px; font-size: 0.8em; text-align: center; color: gray; }
</style>
</head>
<body>

<h1>Train Viewer v8.11</h1>

<label>Route:
  <select id="route">
    <option value="KGX-NCL">King's X → Newcastle</option>
    <option value="NCL-KGX">Newcastle → King's X</option>
    <option value="STP-NCL">St. Pancras → Newcastle</option>
    <option value="NCL-STP">Newcastle → St. Pancras</option>
  </select>
</label>

<label>Date:
  <select id="day"></select>
  <select id="month"></select>
  <select id="year"></select>
</label>

<label>Time:
  <select id="hour"></select>:
  <select id="minute"></select>
</label>

<button id="searchBtn">Search Trains</button>
<div class="timer" id="timer"></div>

<div id="results"></div>

<footer>Credit: LDBWS</footer>

<script>
const ROUTES = {
  'KGX-NCL': { from: "King's X", to: "Newcastle" },
  'NCL-KGX': { from: "Newcastle", to: "King's X" },
  'STP-NCL': { from: "St. Pancras", to: "Newcastle" },
  'NCL-STP': { from: "Newcastle", to: "St. Pancras" },
};

const resultsDiv = document.getElementById('results');
const timerDiv = document.getElementById('timer');

function populateDateTime() {
  const day = document.getElementById('day');
  const month = document.getElementById('month');
  const year = document.getElementById('year');
  const hour = document.getElementById('hour');
  const minute = document.getElementById('minute');

  for (let d = 1; d <= 31; d++) day.add(new Option(d, d));
  const monthNames = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  for (let m = 1; m <= 12; m++) month.add(new Option(`${m} - ${monthNames[m-1]}`, m));
  for (let y = 2026; y <= 2036; y++) year.add(new Option(y, y));
  for (let h = 0; h <= 23; h++) hour.add(new Option(h.toString().padStart(2,'0'), h));
  for (let min = 0; min < 60; min += 5) minute.add(new Option(min.toString().padStart(2,'0'), min));
}

async function fetchTrains() {
  const route = document.getElementById('route').value;
  const date = `${document.getElementById('year').value}-${document.getElementById('month').value}-${document.getElementById('day').value}`;
  const time = `${document.getElementById('hour').value}:${document.getElementById('minute').value}`;

  resultsDiv.innerHTML = '<p>Loading...</p>';
  timerDiv.textContent = '';

  try {
    const res = await fetch(`https://train-api-v2.onrender.com/trains?route=${route}&date=${date}&time=${time}`);
    const data = await res.json();
    displayTrains(data.data || []);
    startTimer();
  } catch {
    resultsDiv.innerHTML = '<p>Error fetching train data.</p>';
  }
}

function displayTrains(trains) {
  resultsDiv.innerHTML = '';
  if(trains.length === 0) {
    resultsDiv.innerHTML = '<p>No trains found.</p>';
    return;
  }
  trains.forEach(train => {
    const div = document.createElement('div');
    div.className = 'train';
    const operatorClass = train.operator === 'LNER' ? 'operator lner' : 'operator lumo';
    let destinationInfo = train.destination ? `<div>Term. @ ${train.destination}</div>` : '';
    div.innerHTML = `
      <div>${train.time} ${ROUTES[document.getElementById('route').value].from} → ${ROUTES[document.getElementById('route').value].to}</div>
      ${destinationInfo}
      <div>Platform ${train.platform}</div>
      <div class="${operatorClass}">${train.operator}</div>
      <div>${train.status}</div>
      <div>${train.duration}</div>
      <div>${train.stops} stops</div>
    `;
    resultsDiv.appendChild(div);
  });
}

let countdown;
function startTimer() {
  let seconds = 15;
  timerDiv.textContent = `Next refresh in ${seconds}s`;
  clearInterval(countdown);
  countdown = setInterval(() => {
    seconds--;
    timerDiv.textContent = `Next refresh in ${seconds}s`;
    if (seconds <= 0) {
      clearInterval(countdown);
      fetchTrains();
    }
  }, 1000);
}

document.getElementById('searchBtn').addEventListener('click', fetchTrains);
populateDateTime();
</script>
</body>
</html>
