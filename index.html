<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer v8.15.1</title>
<style>
  body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
  h1 { text-align:center; }
  select, input { font-size:16px; margin:5px; padding:5px; }
  button { padding:6px 12px; font-size:16px; }
  .result { background:#fff; margin:10px 0; padding:10px; border-radius:6px; }
  .operator.LNER { color:red; font-weight:bold; }
  .operator.Lumo { color:blue; font-weight:bold; }
  .timer { font-size:14px; color:gray; text-align:center; margin-top:10px; }
  footer { text-align:center; font-size:12px; margin-top:20px; color:gray; }
</style>
</head>
<body>
<h1>Train Viewer v8.15</h1>

<form id="searchForm">
  <label>Route: </label>
  <select id="route">
    <option value="KGX-NCL">King's X → Newcastle</option>
    <option value="NCL-KGX">Newcastle → King's X</option>
    <option value="STP-NCL">St. Pancras → Newcastle</option>
    <option value="NCL-STP">Newcastle → St. Pancras</option>
  </select>
  <br>
  <label>Date: </label>
  <select id="day"></select>
  <select id="month"></select>
  <select id="year"></select>
  <br>
  <label>Time: </label>
  <select id="hour"></select>:<select id="minute"></select>
  <br>
  <button type="submit">Search</button>
</form>

<div id="timer" class="timer"></div>
<div id="results"></div>

<footer>Credit: LDBWS</footer>

<script>
const routeSelect = document.getElementById('route');
const daySelect = document.getElementById('day');
const monthSelect = document.getElementById('month');
const yearSelect = document.getElementById('year');
const hourSelect = document.getElementById('hour');
const minuteSelect = document.getElementById('minute');
const resultsDiv = document.getElementById('results');
const timerDiv = document.getElementById('timer');

const monthNames = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

// Populate selects
for(let i=1;i<=31;i++) daySelect.innerHTML += `<option value="${i}">${i}</option>`;
for(let i=0;i<12;i++) monthSelect.innerHTML += `<option value="${i+1}">${i+1} - ${monthNames[i]}</option>`;
for(let i=2026;i<=2036;i++) yearSelect.innerHTML += `<option value="${i}">${i}</option>`;
for(let i=0;i<24;i++) hourSelect.innerHTML += `<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`;
for(let i=0;i<60;i+=5) minuteSelect.innerHTML += `<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`;

// Refresh timer
let refreshInterval;

function startTimer(seconds) {
  clearInterval(refreshInterval);
  let remaining = seconds;
  timerDiv.textContent = `Next refresh in ${remaining}s`;
  refreshInterval = setInterval(() => {
    remaining--;
    timerDiv.textContent = `Next refresh in ${remaining}s`;
    if(remaining <= 0) clearInterval(refreshInterval);
  }, 1000);
}

// Search
document.getElementById('searchForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  resultsDiv.innerHTML = 'Loading...';
  startTimer(15);

  const route = routeSelect.value;
  const date = `${daySelect.value}-${monthSelect.value}-${yearSelect.value}`;
  const time = `${hourSelect.value}:${minuteSelect.value}`;

  try {
    const res = await fetch(`https://train-api-v2.onrender.com/trains?route=${route}&date=${date}&time=${time}`);
    if(!res.ok) throw new Error('Cannot fetch trains');
    const data = await res.json();

    if(!data.data || data.data.length===0){
      resultsDiv.innerHTML = 'No trains found.';
      return;
    }

    resultsDiv.innerHTML = '';
    data.data.forEach(tr => {
      const div = document.createElement('div');
      div.className = 'result';
      div.innerHTML = `
        <div>${tr.time} ${routeSelect.options[routeSelect.selectedIndex].text}${tr.destination ? ' <br>Term. @ '+tr.destination : ''}</div>
        <div>Platform: ${tr.platform}</div>
        <div class="operator ${tr.operator}">${tr.operator}</div>
        <div>Status: ${tr.status}</div>
        <div>Duration: ${tr.duration} | Stops: ${tr.stops}</div>
      `;
      resultsDiv.appendChild(div);
    });

  } catch(err) {
    resultsDiv.innerHTML = 'Error fetching train data.';
    console.error(err);
  }
});
</script>
</body>
</html>
