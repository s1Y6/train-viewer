<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<h2>🚆 Train Viewer</h2>

<p id="recent">Recent: loading...</p>

<hr>

<!-- ROUTES -->
<button onclick="setRoute('KX-NCL')">KX → NCL</button>
<button onclick="setRoute('NCL-KX')">NCL → KX</button>
<button onclick="setRoute('STP-NCL')">STP → NCL</button>
<button onclick="setRoute('NCL-STP')">NCL → STP</button>

<hr>

<!-- TIME -->
<p>Time Control</p>
<button onclick="setNow()">Now</button>
<button onclick="shift(-60)">-1h</button>
<button onclick="shift(60)">+1h</button>

<hr>

<div id="output">Select route</div>

<script>

let route = "";
let baseTime = new Date();

// SAFE recent loader
function loadRecent() {
  const r = localStorage.getItem("recentTrip");

  document.getElementById("recent").innerText =
    "Recent: " + (r ? r : "None");
}

// CENTRAL RENDER (always runs UI)
function render() {
  if (!route) {
    loadRecent();
    return;
  }

  const trains = generateTrains(baseTime);

  const timeStr =
    baseTime.getHours() + ":" +
    String(baseTime.getMinutes()).padStart(2, "0");

  localStorage.setItem("recentTrip", route + " @ " + timeStr);

  loadRecent();

  let html = "<h3>Route: " + route + "</h3>";
  html += "<p>Selected: " + timeStr + "</p><hr>";

  for (let i = 0; i < trains.length; i++) {
    html += "🚆 " + trains[i].label + " - " + trains[i].time + "<br>";
  }

  document.getElementById("output").innerHTML = html;
}

// ROUTE SELECT
function setRoute(r) {
  route = r;
  render();
}

// TIME CONTROL
function setNow() {
  baseTime = new Date();
  render();
}

function shift(mins) {
  baseTime = new Date();
  baseTime.setMinutes(baseTime.getMinutes() + mins);
  render();
}

// TRAIN ENGINE
function generateTrains(base) {
  let trains = [];

  for (let i = -1; i <= 1; i++) {
    let t = new Date(base);
    t.setMinutes(t.getMinutes() + i * 30);

    let h = t.getHours();
    let m = String(t.getMinutes()).padStart(2, "0");

    trains.push({
      time: h + ":" + m,
      label: i === 0 ? "⭐ Closest" : (i < 0 ? "Before" : "After")
    });
  }

  return trains;
}

// INIT (IMPORTANT FIX)
window.onload = function() {
  loadRecent();
  render();
};

</script>

</body>
</html>
