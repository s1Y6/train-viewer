<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer V8.18.7</title>
<style>
    body { background: black; color: white; font-family: monospace; margin: 20px; }
    select, button { background: black; color: white; border: 1px solid white; padding: 5px; font-size: 1em; }
    .operator { font-weight: bold; padding: 2px 4px; border-radius: 3px; }
    .LNER { background-color: #e06666; color: white; }
    .Lumo { background-color: #66b3ff; color: black; }
    .train-box { border: 1px solid white; padding: 10px; margin: 10px 0; }
    #timer { margin-top: 10px; font-size: 0.9em; }
    footer { margin-top: 20px; font-size: 0.8em; color: gray; }
</style>
</head>
<body>

<h1>Train Viewer V8.18.7</h1>

<label>Route:</label>
<select id="route">
    <option value="KGX-NCL">King's X → Newcastle</option>
    <option value="NCL-KGX">Newcastle → King's X</option>
    <option value="STP-NCL">St. Pancras → Newcastle</option>
    <option value="NCL-STP">Newcastle → St. Pancras</option>
</select>

<br><br>
<label>Date:</label>
<select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<br><br>
<label>Time:</label>
<select id="hour"></select>:<select id="minute"></select>

<br><br>
<button id="search">Search Trains</button>

<div id="timer">Next refresh in 15s</div>

<div id="results"></div>

<footer>Credit: LDBWS</footer>

<script>
const routeEl = document.getElementById('route');
const dayEl = document.getElementById('day');
const monthEl = document.getElementById('month');
const yearEl = document.getElementById('year');
const hourEl = document.getElementById('hour');
const minuteEl = document.getElementById('minute');
const resultsEl = document.getElementById('results');
const timerEl = document.getElementById('timer');

const months = [
  {num: '01', short: 'JAN'}, {num: '02', short: 'FEB'}, {num: '03', short: 'MAR'},
  {num: '04', short: 'APR'}, {num: '05', short: 'MAY'}, {num: '06', short: 'JUN'},
  {num: '07', short: 'JUL'}, {num: '08', short: 'AUG'}, {num: '09', short: 'SEP'},
  {num: '10', short: 'OCT'}, {num: '11', short: 'NOV'}, {num: '12', short: 'DEC'}
];

// Populate date/time selects
for (let i=1;i<=31;i++) dayEl.add(new Option(i,i));
months.forEach(m => monthEl.add(new Option(`${m.num} - ${m.short}`, m.num)));
for (let y=2026;y<=2036;y++) yearEl.add(new Option(y,y));
for (let h=0;h<24;h++) hourEl.add(new Option(h.toString().padStart(2,'0'),h));
for (let m=0;m<60;m+=5) minuteEl.add(new Option(m.toString().padStart(2,'0'),m));

// Set default date/time to current
const now = new Date();
dayEl.value = now.getDate();
monthEl.value = (now.getMonth()+1).toString().padStart(2,'0');
yearEl.value = now.getFullYear();
hourEl.value = now.getHours();
minuteEl.value = Math.floor(now.getMinutes()/5)*5;

let countdown = 15;
let timerInterval;

function updateTimer() {
    timerEl.textContent = `Next refresh in ${countdown}s`;
    countdown--;
    if (countdown < 0) {
        countdown = 15;
        fetchTrains();
    }
}

function fetchTrains() {
    const route = routeEl.value;
    const day = dayEl.value;
    const month = monthEl.value;
    const year = yearEl.value;
    const hour = hourEl.value;
    const minute = minuteEl.value;

    resultsEl.innerHTML = 'Loading...';

    fetch(`https://train-api-v2.onrender.com/trains?route=${route}&day=${day}&month=${month}&year=${year}&hour=${hour}&minute=${minute}`)
    .then(res => res.json())
    .then(data => {
        resultsEl.innerHTML = '';
        if (!data.data || data.data.length === 0) {
            resultsEl.textContent = 'No trains found';
            return;
        }

        data.data.forEach(train => {
            const box = document.createElement('div');
            box.className = 'train-box';
            let term = '';
            if (train.terminating && train.terminating !== train.destination) {
                term = `<div>Term. @ ${train.terminating}</div>`;
            }
            box.innerHTML = `
                <div><strong>${train.time}</strong> ${train.origin} → ${train.destination}</div>
                ${term}
                <div>Platform ${train.platform}</div>
                <div class="operator ${train.operator.replace(' ','')}">${train.operator.replace('London North Eastern Railway','LNER')}</div>
                <div>${train.status}</div>
                <div>${train.duration} | ${train.stops} stops</div>
            `;
            resultsEl.appendChild(box);
        });
    })
    .catch(err => resultsEl.textContent = 'Error fetching train data');
}

// Initial fetch and start timer
fetchTrains();
if (timerInterval) clearInterval(timerInterval);
timerInterval = setInterval(updateTimer,1000);

document.getElementById('search').addEventListener('click', () => {
    countdown = 15;
    fetchTrains();
});
</script>

</body>
</html>
