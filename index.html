<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v2</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<h2>🚆 Train Viewer v2</h2>
<p style="color:yellow;">Stable hash version (Nokia compatible)</p>

<hr>

<!-- NAV LINKS -->
<p>Routes:</p>
<a href="#KX-NCL">KX → NCL</a><br>
<a href="#NCL-KX">NCL → KX</a><br>
<a href="#STP-NCL">STP → NCL</a><br>
<a href="#NCL-STP">NCL → STP</a><br>

<hr>

<p>Time:</p>
<a href="#now">Now</a>
<a href="#m60">-1h</a>
<a href="#p60">+1h</a>

<hr>

<div id="output">Loading...</div>

<script>

function render() {
  var h = window.location.hash;

  var out = "";

  // HEADER ALWAYS
  out += "<b>Train Viewer v2</b><br><br>";

  if (!h || h === "#") {
    out += "Select a route.";
    document.getElementById("output").innerHTML = out;
    return;
  }

  // ROUTES
  if (h === "#KX-NCL") {
    out += "<b>KX → NCL</b><br><br>";
    out += "🚆 Before<br>🚆 ⭐ Closest<br>🚆 After";
  }
  else if (h === "#NCL-KX") {
    out += "<b>NCL → KX</b><br><br>";
    out += "🚆 Before<br>🚆 ⭐ Closest<br>🚆 After";
  }
  else if (h === "#STP-NCL") {
    out += "<b>STP → NCL</b><br><br>";
    out += "🚆 Before<br>🚆 ⭐ Closest<br>🚆 After";
  }
  else if (h === "#NCL-STP") {
    out += "<b>NCL → STP</b><br><br>";
    out += "🚆 Before<br>🚆 ⭐ Closest<br>🚆 After";
  }

  // TIME MODES
  else if (h === "#now") {
    out += "<b>Time: Now</b>";
  }
  else if (h === "#m60") {
    out += "<b>Time: -1 Hour</b>";
  }
  else if (h === "#p60") {
    out += "<b>Time: +1 Hour</b>";
  }

  else {
    out += "Unknown selection: " + h;
  }

  document.getElementById("output").innerHTML = out;
}

// RUN ON LOAD
window.onload = function() {
  render();
};

// RUN ON HASH CHANGE
window.onhashchange = function() {
  render();
};

</script>

</body>
</html>
