<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Train Viewer v8.8</title>
<style>
body { font-family: sans-serif; padding: 20px; }
select, button { margin: 5px; padding: 5px; }
#output { margin-top: 20px; }
</style>
</head>
<body>

<h1>Train Viewer v8.7</h1>
<p id="recent">Recent: None</p>

<label for="route">Route:</label>
<select id="route">
  <option value="KGX-NCL">King's X → Newcastle</option>
  <option value="NCL-KGX">Newcastle → King's X</option>
  <option value="STP-NCL">St Pancras → Newcastle</option>
  <option value="NCL-STP">Newcastle → St Pancras</option>
</select>

<label for="day">Day:</label>
<select id="day"></select>
<label for="month">Month:</label>
<select id="month"></select>
<label for="year">Year:</label>
<select id="year"></select>

<label for="hour">Hour:</label>
<select id="hour"></select>
<label for="minute">Minute:</label>
<select id="minute"></select>

<button onclick="run()">Search Trains</button>

<div id="output"></div>

<script>
const API_URL = "https://train-api-v2.onrender.com"; // Your live Render API
const API_TOKEN = "a4ea454d-be6d-4a1f-9030-752640015d99"; // National Rail Darwin Lite token

let selectedRoute = null;
let selectedTime = null;
let autoRefreshTimer = null;

// INIT
function init() {
  const now = new Date();
  buildSelect("day", 1, 31, now.getDate());
  buildMonthSelect();
  buildSelect("year", 2025, 2035, now.getFullYear());
  buildSelect("hour", 0, 23, now.getHours());
  buildSelect("minute", 0, 59, now.getMinutes());
  loadRecent();
}

function buildSelect(id, start, end, selected) {
  const el = document.getElementById(id);
  for (let i=start; i<=end; i++) {
    let val = i<10 ? "0"+i : i;
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = val;
    if (i===selected) opt.selected=true;
    el.appendChild(opt);
  }
}

function buildMonthSelect() {
  const names = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const el = document.getElementById("month");
  const now = new Date().getMonth()+1;
  for (let i=1;i<=12;i++){
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = (i<10?"0"+i:i) + ": "+names[i-1];
    if (i===now) opt.selected=true;
    el.appendChild(opt);
  }
}

function getDateText() {
  let d = document.getElementById("day").value;
  let m = document.getElementById("month").value;
  let y = document.getElementById("year").value;
  if (d<10) d="0"+d;
  if (m<10) m="0"+m;
  return `${d}-${m}-${y}`;
}

// RECENT MEMORY
function loadRecent() {
  const r = localStorage.getItem("recentTrip") || "None";
  document.getElementById("recent").innerHTML = "Recent: " + r;
}

function saveRecent(route, timeStr) {
  const map = { "KGX-NCL":"KGX→NCL", "NCL-KGX":"NCL→KGX", "STP-NCL":"STP→NCL", "NCL-STP":"NCL→STP" };
  const line = map[route] + "@" + timeStr;
  try { localStorage.setItem("recentTrip", line); } catch(e) {}
  document.getElementById("recent").innerHTML = "Recent: " + line;
}

// FORMAT TIME
function format(mins) {
  mins = mins % 1440;
  if (mins<0) mins+=1440;
  let h=Math.floor(mins/60);
  let m=mins%60;
  if(h<10) h="0"+h;
  if(m<10) m="0"+m;
  return h+":"+m;
}

// MAIN SEARCH
async function run() {
  clearTimeout(autoRefreshTimer);

  const route = document.getElementById("route").value;
  const h = parseInt(document.getElementById("hour").value);
  const m = parseInt(document.getElementById("minute").value);
  const timeStr = format(h*60+m);
  selectedRoute = route;
  selectedTime = timeStr;

  saveRecent(route, timeStr);

  const htmlHeader = `<b>Date:</b> ${getDateText()}<br><b>Time:</b> ${timeStr}<br><hr>`;
  document.getElementById("output").innerHTML = htmlHeader + "<b>Loading train data...</b>";

  try {
    const response = await fetch(`${API_URL}/trains?route=${route}&date=${getDateText()}&time=${timeStr}&token=${API_TOKEN}`);
    if(!response.ok) throw new Error("Failed to fetch train data");
    const result = await response.json();

    let html = htmlHeader;
    if(result.data && result.data.length>0){
      result.data.forEach(train=>{
        html += `Time: ${train.time} | Platform: ${train.platform} | Status: ${train.status} | Operator: ${train.operator}<br>`;
      });
    } else {
      html += "No trains found for this time.";
    }
    document.getElementById("output").innerHTML = html;

    // Auto-refresh every 15 seconds if user still on same route
    autoRefreshTimer = setTimeout(()=>{
      if(route===selectedRoute && timeStr===selectedTime) run();
    }, 15000);

  } catch(e) {
    document.getElementById("output").innerHTML = `<b style="color:red;">Error fetching train data.</b><br>${e.message}`;
  }
}

window.onload = init;
</script>
</body>
</html>
