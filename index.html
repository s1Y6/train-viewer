<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer V8.18.5</title>
<style>
  body {
    background-color: #000;
    color: #fff;
    font-family: monospace;
    margin: 0;
    padding: 20px;
  }
  select, button {
    font-family: monospace;
    font-size: 1rem;
    margin: 5px;
    background-color: #111;
    color: #fff;
    border: 1px solid #444;
    padding: 5px;
  }
  button {
    cursor: pointer;
  }
  .operator-lner { color: #FF2E2E; }
  .operator-lumo { color: #3399FF; }
  .train-entry {
    margin: 10px 0;
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
  }
  #countdown { font-size: 0.9rem; margin-top: 10px; color: #aaa; }
  footer { margin-top: 20px; font-size: 0.8rem; color: #888; }
</style>
</head>
<body>

<h1>Train Viewer V8.18.5</h1>

<div>
  <label>Route:</label>
  <select id="route">
    <option value="KGX-NCL">King's X → Newcastle</option>
    <option value="NCL-KGX">Newcastle → King's X</option>
    <option value="STP-NCL">St. Pancras → Newcastle</option>
    <option value="NCL-STP">Newcastle → St. Pancras</option>
  </select>
</div>

<div>
  <label>Date:</label>
  <select id="day"></select>
  <select id="month"></select>
  <select id="year"></select>
</div>

<div>
  <label>Time:</label>
  <select id="hour"></select> :
  <select id="minute"></select>
</div>

<button id="searchBtn">Search Trains</button>

<div id="countdown"></div>
<div id="results"></div>
<footer>Credit: LDBWS</footer>

<script>
const routeSelect = document.getElementById('route');
const daySelect = document.getElementById('day');
const monthSelect = document.getElementById('month');
const yearSelect = document.getElementById('year');
const hourSelect = document.getElementById('hour');
const minuteSelect = document.getElementById('minute');
const resultsDiv = document.getElementById('results');
const countdownDiv = document.getElementById('countdown');

const months = [
  {num: '01', name: 'JAN'}, {num: '02', name: 'FEB'}, {num: '03', name: 'MAR'}, {num: '04', name: 'APR'},
  {num: '05', name: 'MAY'}, {num: '06', name: 'JUN'}, {num: '07', name: 'JUL'}, {num: '08', name: 'AUG'},
  {num: '09', name: 'SEP'}, {num: '10', name: 'OCT'}, {num: '11', name: 'NOV'}, {num: '12', name: 'DEC'}
];

function fillSelects() {
  const now = new Date();
  for(let i=1;i<=31;i++) daySelect.add(new Option(i,i));
  months.forEach(m => monthSelect.add(new Option(`${m.num} - ${m.name}`, m.num)));
  for(let y=2026; y<=2036; y++) yearSelect.add(new Option(y,y));
  for(let h=0; h<=23; h++) hourSelect.add(new Option(h.toString().padStart(2,'0'), h));
  for(let m=0; m<60; m+=5) minuteSelect.add(new Option(m.toString().padStart(2,'0'), m));
  daySelect.value = now.getDate();
  monthSelect.value = (now.getMonth()+1).toString().padStart(2,'0');
  yearSelect.value = now.getFullYear();
  hourSelect.value = now.getHours();
  minuteSelect.value = Math.floor(now.getMinutes()/5)*5;
}

let countdownInterval;

async function searchTrains() {
  clearInterval(countdownInterval);
  resultsDiv.innerHTML = 'Loading...';
  
  const route = routeSelect.value;
  const date = `${yearSelect.value}-${monthSelect.value}-${daySelect.value}`;
  const time = `${hourSelect.value}:${minuteSelect.value}`;

  try {
    const res = await fetch(`https://train-api-v2.onrender.com/trains?route=${route}&date=${date}&time=${time}`);
    const data = await res.json();

    if(!data || !data.data || data.data.length===0) {
      resultsDiv.innerHTML = 'No trains found';
      return;
    }

    resultsDiv.innerHTML = '';
    data.data.forEach(train => {
      const termInfo = train.terminatingAfterDest ? `<div>Term. @ ${train.terminatingAfterDest}</div>` : '';
      const operatorClass = train.operator==='LNER' ? 'operator-lner' : (train.operator==='Lumo' ? 'operator-lumo' : '');
      const html = `
        <div class="train-entry">
          <div>${train.time} ${train.from} → ${train.to}</div>
          ${termInfo}
          <div>Platform ${train.platform}</div>
          <div class="${operatorClass}">${train.operator}</div>
          <div>${train.status}</div>
          <div>${train.duration} | ${train.stops} stops</div>
        </div>`;
      resultsDiv.insertAdjacentHTML('beforeend', html);
    });

    let seconds = 15;
    countdownDiv.textContent = `Refreshing in ${seconds}s`;
    countdownInterval = setInterval(() => {
      seconds--;
      countdownDiv.textContent = `Refreshing in ${seconds}s`;
      if(seconds<=0) {
        clearInterval(countdownInterval);
        searchTrains();
      }
    },1000);

  } catch(err) {
    resultsDiv.innerHTML = 'Error fetching train data.';
    console.error(err);
  }
}

document.getElementById('searchBtn').addEventListener('click', searchTrains);
fillSelects();
</script>
</body>
</html>
