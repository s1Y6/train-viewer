<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v5</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<h2>🚆 Train Viewer v5</h2>
<p style="color:yellow;">Planner mode (date + time + average time input)</p>

<hr>

<!-- ROUTES -->
<p><b>Route</b></p>
<a href="#KX-NCL">KX → NCL</a><br>
<a href="#NCL-KX">NCL → KX</a><br>
<a href="#STP-NCL">STP → NCL</a><br>
<a href="#NCL-STP">NCL → STP</a><br>

<hr>

<!-- DATE + TIME INPUT (NO FORMS - NOKIA SAFE) -->
<p><b>Date & Time (tap links)</b></p>

<a href="#now">Now (default)</a><br>
<a href="#t-30">-30 min</a>
<a href="#t0">Exact</a>
<a href="#t+30">+30 min</a>
<a href="#t+60">+1 hour</a>

<hr>

<div id="output">Select route</div>

<script>

let route = "";
let selectedTime = new Date();

// ROUTING ENGINE
function render() {
  var h = location.hash;

  var html = "<b>Train Viewer v5 (OG Planner)</b><br><br>";

  if (!h || h === "#") {
    html += "Select route + time.";
    document.getElementById("output").innerHTML = html;
    return;
  }

  // ROUTES
  if (h === "#KX-NCL") route = "Kings Cross → Newcastle";
  if (h === "#NCL-KX") route = "Newcastle → Kings Cross";
  if (h === "#STP-NCL") route = "St Pancras → Newcastle";
  if (h === "#NCL-STP") route = "Newcastle → St Pancras";

  // TIME SETTING (DEFAULT = NOW)
  if (h === "#now") selectedTime = new Date();
  if (h === "#t-30") selectedTime = new Date(Date.now() - 30 * 60000);
  if (h === "#t0") selectedTime = new Date();
  if (h === "#t+30") selectedTime = new Date(Date.now() + 30 * 60000);
  if (h === "#t+60") selectedTime = new Date(Date.now() + 60 * 60000);

  // OUTPUT
  html += "<b>Route:</b> " + (route || "Not selected") + "<br>";

  html += "<b>Date:</b> " + selectedTime.toDateString() + "<br>";
  html += "<b>Time:</b> " + formatTime(selectedTime) + "<br><hr>";

  html += buildTrains();

  document.getElementById("output").innerHTML = html;
}

// TRAIN ENGINE (REALISTIC 3 TRAIN MATCH)
function buildTrains() {
  var base = selectedTime.getHours() * 60 + selectedTime.getMinutes();

  var out = "";

  out += "🚆 Before - " + formatMinutes(base - 25) + "<br>";
  out += "🚆 ⭐ Closest - " + formatMinutes(base) + "<br>";
  out += "🚆 After - " + formatMinutes(base + 25) + "<br>";

  return out;
}

// FORMAT TIME
function formatTime(d) {
  var h = d.getHours();
  var m = d.getMinutes();

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

// FORMAT MINUTES
function formatMinutes(mins) {
  mins = mins % 1440;
  if (mins < 0) mins += 1440;

  var h = Math.floor(mins / 60);
  var m = mins % 60;

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  return h + ":" + m;
}

window.onload = render;
window.onhashchange = render;

</script>

</body>
</html>
