<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Viewer v8.11</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 1em; }
  select, button { padding: 0.5em; margin: 0.3em 0; font-size: 1em; }
  .label { font-weight: bold; margin-top: 1em; display: block; }
  #results { margin-top: 1em; }
</style>
</head>
<body>

<h1>Train Viewer v8.11</h1>

<label class="label">Route:</label>
<select id="route">
  <option value="KGX-NCL">King's X → Newcastle</option>
  <option value="NCL-KGX">Newcastle → King's X</option>
  <option value="STP-NCL">St. Pancras → Newcastle</option>
  <option value="NCL-STP">Newcastle → St. Pancras</option>
</select>

<label class="label">When:</label>
<select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<label class="label">Time:</label>
<select id="hour"></select> :
<select id="minute"></select>

<button id="search">Search Trains</button>

<div id="results"></div>

<script>
  // Populate day, month, year, hour, minute
  const daySelect = document.getElementById("day");
  const monthSelect = document.getElementById("month");
  const yearSelect = document.getElementById("year");
  const hourSelect = document.getElementById("hour");
  const minuteSelect = document.getElementById("minute");
  const resultsDiv = document.getElementById("results");

  // Day 1-31
  for (let d = 1; d <= 31; d++) {
    const opt = document.createElement("option");
    opt.value = d;
    opt.text = d;
    daySelect.add(opt);
  }

  // Month 1-12 with short names
  const monthNames = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  for (let m = 0; m < 12; m++) {
    const opt = document.createElement("option");
    opt.value = m+1;
    opt.text = `${m+1} - ${monthNames[m]}`;
    monthSelect.add(opt);
  }

  // Year 2026-2036
  for (let y = 2026; y <= 2036; y++) {
    const opt = document.createElement("option");
    opt.value = y;
    opt.text = y;
    yearSelect.add(opt);
  }

  // Hour 0-23
  for (let h = 0; h <= 23; h++) {
    const opt = document.createElement("option");
    opt.value = h;
    opt.text = h.toString().padStart(2,"0");
    hourSelect.add(opt);
  }

  // Minute every 5 minutes
  for (let m = 0; m <= 55; m+=5) {
    const opt = document.createElement("option");
    opt.value = m;
    opt.text = m.toString().padStart(2,"0");
    minuteSelect.add(opt);
  }

  async function fetchTrains() {
    const route = document.getElementById("route").value;
    const day = daySelect.value.padStart(2,"0");
    const month = monthSelect.value.padStart(2,"0");
    const year = yearSelect.value;
    const hour = hourSelect.value.padStart(2,"0");
    const minute = minuteSelect.value.padStart(2,"0");

    resultsDiv.innerHTML = "Loading...";

    try {
      const res = await fetch(`https://train-api-v2.onrender.com/trains?route=${route}`);
      const data = await res.json();
      if(data.error) {
        resultsDiv.innerHTML = `<span style="color:red;">${data.error}</span>`;
        return;
      }
      resultsDiv.innerHTML = data.data.map(t => `
        Time: ${t.time} | Platform: ${t.platform} | Status: ${t.status} | Operator: ${t.operator}
      `).join("<br>");
    } catch(e) {
      resultsDiv.innerHTML = `<span style="color:red;">Error fetching train data.</span>`;
      console.error(e);
    }
  }

  document.getElementById("search").addEventListener("click", fetchTrains);

  // Auto-refresh every 15s if results are visible
  setInterval(() => {
    if(resultsDiv.innerHTML.trim() && !resultsDiv.innerHTML.includes("Error")) {
      fetchTrains();
    }
  }, 15000);
</script>
</body>
</html>
