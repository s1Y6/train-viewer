<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Train Viewer v1 STATIC</title>
</head>

<body style="background:black;color:lime;font-family:monospace;font-size:14px;">

<h2>🚆 Train Viewer v1 (STATIC MODE)</h2>

<hr>

<!-- NAVIGATION -->
<p>Routes:</p>
<a href="index.html#KX-NCL">KX → NCL</a><br>
<a href="index.html#NCL-KX">NCL → KX</a><br>
<a href="index.html#STP-NCL">STP → NCL</a><br>
<a href="index.html#NCL-STP">NCL → STP</a><br>

<hr>

<p>Time:</p>
<a href="index.html#now">Now</a>
<a href="index.html#m60">-1h</a>
<a href="index.html#p60">+1h</a>

<hr>

<!-- STATIC OUTPUT AREA -->
<div style="border:1px solid lime;padding:5px;">

<script>
  var h = window.location.hash;

  if (!h) {
    document.write("Select a route above.");
  }

  else if (h === "#KX-NCL") {
    document.write("<b>KX → NCL</b><br><br>🚆 Train 1<br>🚆 Train 2<br>🚆 Train 3");
  }

  else if (h === "#NCL-KX") {
    document.write("<b>NCL → KX</b><br><br>🚆 Train 1<br>🚆 Train 2<br>🚆 Train 3");
  }

  else if (h === "#STP-NCL") {
    document.write("<b>STP → NCL</b><br><br>🚆 Train 1<br>🚆 Train 2<br>🚆 Train 3");
  }

  else if (h === "#NCL-STP") {
    document.write("<b>NCL → STP</b><br><br>🚆 Train 1<br>🚆 Train 2<br>🚆 Train 3");
  }

  else {
    document.write("<b>Time Mode:</b> " + h.replace("#",""));
  }
</script>

</div>

</body>
</html>
